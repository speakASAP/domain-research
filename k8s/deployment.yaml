apiVersion: apps/v1
kind: Deployment
metadata:
  name: domain-research
  namespace: statex-apps
  labels:
    app: domain-research
    managed-by: k8s-migration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: domain-research
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: domain-research
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z db-server-postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: app
          image: localhost:5000/domain-research:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4860
              name: http
          envFrom:
            - configMapRef:
                name: domain-research-config
            - secretRef:
                name: domain-research-secret
          startupProbe:
            httpGet:
              path: /health
              port: 4860
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4860
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 4860
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
