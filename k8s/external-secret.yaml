apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: domain-research-secret
  namespace: statex-apps
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: domain-research-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/prod/domain-research
        property: DB_PASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/prod/domain-research
        property: JWT_SECRET
    - secretKey: JWT_TOKEN
      remoteRef:
        key: secret/prod/domain-research
        property: JWT_TOKEN
    - secretKey: AI_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/domain-research
        property: AI_SERVICE_TOKEN
    - secretKey: NOTIFICATION_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/domain-research
        property: NOTIFICATION_SERVICE_TOKEN
