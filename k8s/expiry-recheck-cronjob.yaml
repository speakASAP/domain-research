apiVersion: batch/v1
kind: CronJob
metadata:
  name: domain-research-expiry-recheck
  namespace: statex-apps
  labels:
    app: domain-research
    component: expiry-recheck
    managed-by: k8s-migration
spec:
  # Staggered (was */5, colliding every fire with warehouse-reservation-expiry's
  # identical */5 schedule -- both spawning Jobs with imagePullPolicy: Always
  # on the same single-node cluster at the exact same second). See
  # shared/docs/DEPLOY_STANDARDIZATION_REPORT.md section 12 addendum.
  schedule: "2-57/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: domain-research
            component: expiry-recheck
        spec:
          restartPolicy: Never
          containers:
            - name: expiry-recheck
              image: localhost:5000/domain-research:latest
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: domain-research-config
                - secretRef:
                    name: domain-research-secret
              command: ["node", "-e"]
              args:
                - |
                  const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
                  // Retries transport errors (ECONNREFUSED while the target has no ready
                  // endpoint) and 5xx only. Business failures are never retried here.
                  // Backoff ladder matches domain-research-notification-dispatch, which rides
                  // out these blips reliably while the un-retried jobs fail.
                  const RETRY_DELAYS_MS = [0, 5000, 10000, 20000, 30000, 45000];
                  async function fetchWithRetry(url, options) {
                    let lastError;
                    for (let i = 0; i < RETRY_DELAYS_MS.length; i += 1) {
                      const isLast = i === RETRY_DELAYS_MS.length - 1;
                      if (RETRY_DELAYS_MS[i] > 0) await sleep(RETRY_DELAYS_MS[i]);
                      try {
                        const response = await fetch(url, options);
                        if (response.status >= 500 && !isLast) {
                          lastError = new Error(`upstream returned ${response.status}`);
                        } else {
                          return response;
                        }
                      } catch (error) {
                        lastError = error;
                        if (isLast) break;
                      }
                      console.error(`attempt ${i + 1}/${RETRY_DELAYS_MS.length} failed: ${lastError.message}; retrying`);
                    }
                    throw lastError;
                  }
                  (async () => {
                    const jwt = require('jsonwebtoken');
                    const baseUrl = 'http://domain-research:4860';
                    if (!process.env.JWT_SECRET) throw new Error('JWT_SECRET is required');
                    const token = jwt.sign({ sub: 'domain-research-expiry-cron', roles: ['internal:domain-research:admin'] }, process.env.JWT_SECRET, { expiresIn: '5m' });
                    const response = await fetchWithRetry(`${baseUrl}/api/internal/jobs/expiry-recheck/run-due`, {
                      method: 'POST',
                      headers: { authorization: `Bearer ${token}`, 'content-type': 'application/json' },
                      body: JSON.stringify({ limit: 100 }),
                    });
                    const payload = await response.json();
                    console.log(JSON.stringify(payload));
                    if (!response.ok || payload.failed > 0) throw new Error(`expiry recheck failed: ${JSON.stringify(payload)}`);
                  })().catch((error) => { console.error(error); process.exit(1); });
