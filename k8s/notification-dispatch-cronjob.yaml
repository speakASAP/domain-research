apiVersion: batch/v1
kind: CronJob
metadata:
  name: domain-research-notification-dispatch
  namespace: statex-apps
  labels:
    app: domain-research
    component: notification-dispatch
    managed-by: k8s-migration
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: domain-research
            component: notification-dispatch
        spec:
          restartPolicy: Never
          containers:
            - name: notification-dispatch
              image: localhost:5000/domain-research:latest
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: domain-research-config
                - secretRef:
                    name: domain-research-secret
              command: ["node", "-e"]
              args:
                - |
                  (async () => {
                    const jwt = require('jsonwebtoken');
                    const baseUrl = 'http://domain-research:4860';
                    if (!process.env.JWT_SECRET) throw new Error('JWT_SECRET is required');
                    const token = jwt.sign({ sub: 'domain-research-notification-cron', roles: ['internal:domain-research:admin'] }, process.env.JWT_SECRET, { expiresIn: '5m' });
                    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
                    const requestDispatch = async () => fetch(`${baseUrl}/api/internal/jobs/notification-dispatch/run-due`, {
                      method: "POST",
                      headers: { authorization: `Bearer ${token}`, "content-type": "application/json" },
                      body: JSON.stringify({ limit: 100 }),
                    });
                    let response;
                    let lastError;
                    for (const delayMs of [0, 5000, 10000, 20000, 30000, 45000]) {
                      if (delayMs > 0) await sleep(delayMs);
                      try {
                        response = await requestDispatch();
                        break;
                      } catch (error) {
                        lastError = error;
                        console.error(`notification dispatch request failed; retrying after transient network error: ${error.message}`);
                      }
                    }
                    if (!response) throw lastError;
                    const payload = await response.json();
                    console.log(JSON.stringify(payload));
                    if (!response.ok || payload.failed > 0) throw new Error(`notification dispatch failed: ${JSON.stringify(payload)}`);
                  })().catch((error) => { console.error(error); process.exit(1); });
