<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Domain Research</title>
    <link rel="stylesheet" href="/styles.css?v=watch-edit-20260627" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>Domain Research</h1>
            <p>Describe a business, compare domain candidates, and watch registered names until they become available.</p>
          </div>
          <div class="top-actions">
            <span class="status-pill" id="authStatus">signed out</span>
            <button id="authButton" type="button">Sign in</button>
          </div>
        </header>

        <form id="suggestionForm" class="panel">
          <div class="field-header">
            <label for="description">Business or service description</label>
            <button id="voiceDescription" class="voice-button" type="button" aria-label="Start voice dictation" aria-pressed="false">
              <span class="voice-dot" aria-hidden="true"></span>
              <span id="voiceButtonText">Voice input</span>
            </button>
          </div>
          <textarea id="description" required rows="5" placeholder="Example: AI assistant that helps founders find available domain names and tracks expiring domains"></textarea>
          <p id="voiceStatus" class="voice-status" role="status" aria-live="polite">Chrome voice input ready.</p>
          <label class="wide-field">
            Domain names to test
            <textarea id="seedDomains" rows="3" placeholder="testhub, gettest, testpilot"></textarea>
          </label>
          <div class="grid">
            <label>
              TLDs
              <input id="tlds" value="com,cz" readonly />
            </label>
            <label>
              Count
              <input id="count" type="number" value="12" min="3" max="50" />
            </label>
          </div>
          <button type="submit">Generate candidates</button>
        </form>

        <section class="panel">
          <div class="section-title">
            <h2>Candidates</h2>
            <div class="button-group">
              <button id="addSelectedToWatch" type="button">Add selected to Watch</button>
              <button id="checkSelected" type="button">Check selected</button>
              <button id="clearCandidates" class="secondary" type="button">Clear</button>
            </div>
          </div>
          <form id="customCandidateForm" class="custom-candidate-form">
            <input id="customCandidates" placeholder="super, mega, nexus, statex, alfares.cz" autocomplete="off" />
            <button type="submit">Add candidates</button>
          </form>
          <div id="candidateList" class="candidate-list"></div>
        </section>

        <section class="panel">
          <div class="section-title">
            <h2>Watch a domain</h2>
            <button id="refreshWatches" type="button">Check watched</button>
          </div>
          <form id="watchForm" class="watch-form">
            <div class="watch-domain-entry">
              <div id="watchDomainChips" class="watch-domain-chips" aria-live="polite"></div>
              <input id="watchDomain" placeholder="example.com, example.org" autocomplete="off" />
            </div>
            <button id="createWatchesButton" type="button">Create watches</button>
          </form>
          <div class="watch-table-shell">
            <div id="watchList" class="watch-list"></div>
          </div>
        </section>
      </section>
    </main>
    <script src="/app.js?v=watch-edit-20260627"></script>
  </body>
</html>
